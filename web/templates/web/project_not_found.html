{% extends "web/base.html" %}

      <h1 class="text-2xl font-semibold text-white">Project not found</h1>
      <p class="mt-2 text-sm text-slate-300/80">No project matches &ldquo;{{ slug }}&rdquo;.</p>

      >
    </div>
  </div>
{% endblock %}
