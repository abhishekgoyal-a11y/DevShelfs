<a
  href="{% url 'project_detail' project.slug %}"
  class="group block h-full rounded-3xl outline-none focus-visible:ring-2 focus-visible:ring-sky-400/60 focus-visible:ring-offset-2 focus-visible:ring-offset-slate-950"
>
  <div
    class="glass relative h-full overflow-hidden rounded-3xl p-4 sm:p-5 transition duration-500 hover:-translate-y-1 hover:shadow-glow motion-reduce:transform-none"
  >
    <div
      class="pointer-events-none absolute inset-0 opacity-0 transition duration-500 group-hover:opacity-100"
    >
      <div class="absolute -left-24 -top-24 h-56 w-56 rounded-full bg-indigo-500/20 blur-3xl"></div>
      <div class="absolute -bottom-24 -right-24 h-56 w-56 rounded-full bg-sky-400/15 blur-3xl"></div>
    </div>
    <div class="relative flex h-full min-h-0 flex-col">
      <div class="flex flex-wrap items-start justify-between gap-3">
        <h2 class="text-balance text-xl font-semibold tracking-tight text-white sm:text-2xl">
          {{ project.title }}
        </h2>
        {% include "web/partials/difficulty_badge.html" with level=project.difficulty only %}
      </div>
      <p class="mt-2 text-sm leading-snug text-slate-200/75 sm:text-base">{{ project.description }}</p>
      <div class="mt-3 flex flex-wrap gap-2">
        {% for t in project.tech %}
          <span
            class="inline-flex items-center rounded-full border border-white/10 bg-white/5 px-2.5 py-1 text-xs font-medium text-slate-100/90"
            >{{ t }}</span
          >
        {% endfor %}
      </div>
      <div class="mt-auto flex justify-end pt-3 sm:pt-4">
        <span class="text-sm font-semibold text-sky-200/95 transition group-hover:text-white"
          >View project →</span
        >
      </div>
    </div>
  </div>
</a>
